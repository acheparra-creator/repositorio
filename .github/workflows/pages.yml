name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths: ['padel-americano/**', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Preparar sitio (solo la app de pádel)
        run: |
          mkdir -p _site/padel-americano
          cp padel-americano/index.html padel-americano/engine.js _site/padel-americano/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
