name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths: ['padel-americano/**', 'renalia-tecoman/**', 'rumbo-alfa-centauri/**', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Preparar sitio (renalia en raíz + pádel + rumbo a alfa centauri)
        run: |
          mkdir -p _site/padel-americano
          cp padel-americano/index.html padel-americano/engine.js _site/padel-americano/
          mkdir -p _site/rumbo-alfa-centauri
          cp rumbo-alfa-centauri/index.html rumbo-alfa-centauri/engine.js rumbo-alfa-centauri/data.js _site/rumbo-alfa-centauri/
          cp -R renalia-tecoman/index.html renalia-tecoman/styles.css renalia-tecoman/robots.txt renalia-tecoman/sitemap.xml renalia-tecoman/assets _site/
          echo "renaliatecoman.com" > _site/CNAME
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
