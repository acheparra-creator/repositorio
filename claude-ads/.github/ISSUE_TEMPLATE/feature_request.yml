name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have a feature idea? You can also discuss it in [GitHub Discussions](https://github.com/Hainrixz/claude-ads/discussions) for community input before opening a formal request.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or limitation you've run into
      placeholder: "e.g. The /ads google skill doesn't flag campaigns missing conversion-based bidding..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: dropdown
    id: platforms
    attributes:
      label: Related Ad Platform (if applicable)
      description: "v2.3.0 focuses on Meta / Google / TikTok. If you're requesting a NEW platform integration (Pinterest, Reddit, X, etc.), pick 'New platform (please specify in Proposed Solution)'."
      multiple: true
      options:
        - Google Ads (includes YouTube video campaigns)
        - Meta Ads
        - TikTok Ads
        - Cross-platform / General
        - New platform (please specify in Proposed Solution)
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you tried workarounds? Are there other approaches?
    validations:
      required: false
