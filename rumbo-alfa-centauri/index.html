<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rumbo a Alfa Centauri</title>
<style>
  :root {
    --bg: #060912; --bg2: #0f1630; --card: #141b2e; --ink: #e8edf2; --muted: #8b96ad;
    --accent: #a78bfa; --accent-ink: #0b1020; --line: #232c42; --good: #4ade80; --bad: #f87171;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--ink); }
  .wrap { max-width: 560px; margin: 0 auto; padding: 16px 12px 40px; }
  h1 { font-size: 1.3rem; margin: 8px 0 16px; text-align: center; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
  .chars { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .char { background: var(--card); border: 2px solid var(--line); border-radius: 12px; padding: 12px; text-align: center; cursor: pointer; }
  .char.sel { border-color: var(--accent); background: #1c1440; }
  .char .emoji { font-size: 2rem; }
  .char .lvl { color: var(--muted); font-size: .8rem; }
  button { font-size: 1rem; border: none; border-radius: 10px; padding: 12px 16px; cursor: pointer; }
  .primary { background: var(--accent); color: var(--accent-ink); width: 100%; margin-top: 14px; }
  .primary:disabled { opacity: .4; cursor: not-allowed; }
  .board { display: flex; overflow-x: auto; gap: 8px; padding: 10px 4px; background: radial-gradient(ellipse at top, var(--bg2), var(--bg) 70%); border-radius: 12px; }
  .cell { flex: 0 0 auto; width: 78px; text-align: center; }
  .cell .planet { font-size: 1.6rem; background: var(--card); border: 1px solid var(--line); border-radius: 50%; width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
  .cell .name { font-size: .68rem; color: var(--muted); margin-top: 4px; }
  .cell .tokens { font-size: 1rem; min-height: 1.2em; }
  .turn { text-align: center; font-weight: 700; margin: 10px 0; }
  .qcat { color: var(--muted); font-size: .8rem; text-transform: uppercase; }
  .qtext { font-size: 1.1rem; margin: 8px 0 14px; }
  .opt { display: block; width: 100%; text-align: left; background: var(--bg2); border: 1px solid var(--line); color: var(--ink); margin-bottom: 8px; }
  .opt.correct { background: var(--good); color: #06280f; border-color: var(--good); }
  .opt.wrong { background: var(--bad); color: #3a0a0a; border-color: var(--bad); }
  .explain { background: var(--bg2); border-radius: 10px; padding: 10px; margin-top: 10px; font-size: .92rem; }
  .stats { width: 100%; border-collapse: collapse; }
  .stats td, .stats th { padding: 6px; border-bottom: 1px solid var(--line); text-align: left; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script src="data.js"></script>
<script src="engine.js"></script>
<script>
'use strict';
const CATEGORY_LABELS = {
  espacio: 'Espacio y astronomía',
  fisica: 'Física y naturaleza',
  biologia: 'Cuerpo humano y biología',
  quimica: 'Química y materia',
};
const ui = { screen: 'select', selected: [] };
let game = null;

function esc(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function renderSelect() {
  const cards = RumboEngine.CHARACTERS.map((c) => {
    const sel = ui.selected.includes(c.id) ? ' sel' : '';
    return `<div class="char${sel}" onclick="selectCharacter('${c.id}')">
      <div class="emoji">${c.emoji}</div>
      <div>${esc(c.name)}</div>
      <div class="lvl">Nivel: ${esc(c.level)}</div>
    </div>`;
  }).join('');
  const canStart = ui.selected.length >= 2 && ui.selected.length <= 4;
  return `<h1>🚀 Rumbo a Alfa Centauri</h1>
    <div class="card">
      <p>Toca a los jugadores que van a participar (2 a 4).</p>
      <div class="chars">${cards}</div>
      <button class="primary" ${canStart ? '' : 'disabled'} onclick="startGame()">Empezar partida</button>
    </div>`;
}
function selectCharacter(id) {
  const i = ui.selected.indexOf(id);
  if (i >= 0) ui.selected.splice(i, 1);
  else if (ui.selected.length < 4) ui.selected.push(id);
  render();
}
function startGame() {
  game = RumboEngine.createGame(ui.selected, QUESTIONS);
  RumboEngine.drawQuestion(game);
  ui.screen = 'play';
  render();
}

function renderPlay() {
  const cells = RumboEngine.BOARD.map((cell, i) => {
    const tokens = game.players.filter((p) => p.position === i).map((p) => p.emoji).join(' ');
    return `<div class="cell">
      <div class="planet">${cell.emoji}</div>
      <div class="name">${esc(cell.name)}</div>
      <div class="tokens">${tokens}</div>
    </div>`;
  }).join('');
  const player = RumboEngine.currentPlayer(game);
  const q = game.pendingQuestion;
  const result = game.pendingResult;
  let optsHtml = '';
  q.options.forEach((opt, i) => {
    let cls = 'opt';
    if (result) {
      if (i === q.correctIndex) cls += ' correct';
      else if (i === result.optionIndex) cls += ' wrong';
    }
    const attr = result ? '' : `onclick="answer(${i})"`;
    optsHtml += `<button class="${cls}" ${attr}>${esc(opt)}</button>`;
  });
  let footer = '';
  if (result) {
    footer = `<div class="explain">${result.correct ? '✅ ¡Correcto! ' : '❌ No era esa. '}${esc(q.explanation)}</div>
      <button class="primary" onclick="continueTurn()">Continuar</button>`;
  }
  return `<div class="board">${cells}</div>
    <div class="turn">${player.emoji} Turno de ${esc(player.name)}</div>
    <div class="card">
      <div class="qcat">${esc(CATEGORY_LABELS[q.category])}</div>
      <div class="qtext">${esc(q.question)}</div>
      ${optsHtml}
      ${footer}
    </div>`;
}
function answer(i) {
  RumboEngine.submitAnswer(game, i);
  render();
}
function continueTurn() {
  RumboEngine.advanceTurn(game);
  if (game.winnerId) { ui.screen = 'victory'; }
  else { RumboEngine.drawQuestion(game); }
  render();
}
function renderVictory() {
  const winner = game.players.find((p) => p.id === game.winnerId);
  const rows = game.players.map((p) =>
    `<tr><td>${p.emoji} ${esc(p.name)}</td><td>${p.correct}</td><td>${p.wrong}</td></tr>`
  ).join('');
  return `<h1>🏆 ¡${esc(winner.name)} llegó a Alfa Centauri!</h1>
    <div class="card">
      <table class="stats"><thead><tr><th>Jugador</th><th>Aciertos</th><th>Fallos</th></tr></thead>
      <tbody>${rows}</tbody></table>
      <button class="primary" onclick="playAgain()">Jugar de nuevo</button>
    </div>`;
}
function playAgain() {
  game = null;
  ui.screen = 'select';
  ui.selected = [];
  render();
}
function render() {
  const app = document.getElementById('app');
  if (ui.screen === 'select') app.innerHTML = renderSelect();
  else if (ui.screen === 'play') app.innerHTML = renderPlay();
  else app.innerHTML = renderVictory();
}
render();
</script>
</body>
</html>
